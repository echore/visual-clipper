<!DOCTYPE html>
<html lang="zh" data-destination="obsidian">
<head>
  <meta charset="utf-8">
  <title data-i18n="welcome_tab_title"></title>
  <style>
    body { max-width: 780px; margin: 60px auto; font: 15px/1.7 system-ui,sans-serif;
      color: #1f2937; padding: 0 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #6b7280; margin-bottom: 32px; }
    h2 { font-size: 15px; font-weight: 600; margin: 28px 0 8px; }
    p  { margin: 6px 0; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px;
      font: 13px/1.4 monospace; }
    .step { display: flex; gap: 14px; margin: 12px 0; }
    .step-num { min-width: 56px; padding: 0 10px; height: 24px; background: #e8e3d9; color: #2d2b28;
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font: 600 12px system-ui; flex-shrink: 0; margin-top: 2px; }
    .note { background: #fef9c3; border: 1px solid #fde047; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin: 16px 0; }
    .check { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin: 16px 0; }
    .check.ok  { border-color: #6ee7b7; background: #ecfdf5; }
    .check.bad { border-color: #fca5a5; background: #fef2f2; }
    .check .status { font-weight: 600; }
    .check .detail { font-size: 13px; color: #6b7280; margin-top: 4px; }
    button.act { background: #6366f1; color: #fff; border: none; padding: 6px 14px;
      border-radius: 6px; font: 600 13px system-ui; cursor: pointer; margin-top: 8px; }
    button.act:hover { background: #4f46e5; }
    button.act:disabled { opacity: .5; cursor: default; }
    pre.tree { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px 16px; font: 12px/1.6 monospace; overflow-x: auto; }
    details.adv { margin: 24px 0; font-size: 13px; }
    details.adv summary { cursor: pointer; color: #6b7280; }
    details.adv input { width: 90px; font: 13px monospace; padding: 2px 6px;
      border: 1px solid #e5e7eb; border-radius: 4px; }
    .zeroconfig { background: #eef7f0; border-radius: 6px; padding: 8px 12px; }
    .dl-btn { display: inline-block; background: #6366f1; color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font: 600 13px system-ui; }
    .dl-btn:hover { background: #4f46e5; }
    .alt { font-size: 13px; color: #6b7280; }
    .dest-choice label { display: block; margin: 4px 0; cursor: pointer; }
    [data-dest-only] { display: none; }
    html[data-destination="obsidian"] [data-dest-only="obsidian"]:not([hidden]),
    html[data-destination="notion"] [data-dest-only="notion"]:not([hidden]) { display: block; }
    [hidden] { display: none !important; }
    .setup-panel { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 4px 20px 14px; margin-top: 12px; }
    .stage { border-top: 1px solid #e5e7eb; padding: 22px 0; }
    .stage:first-child { border-top: 0; }
    .stage-head { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .stage-title { margin: 0; font-size: 16px; line-height: 1.45; }
    .stage-outcome, .helper, figcaption { color: #6b7280; font-size: 13px; }
    .stage-outcome { margin: 2px 0 0; }
    .setup-steps { margin: 12px 0; padding-left: 22px; }
    .setup-steps li { margin: 7px 0; padding-left: 4px; }
    .setup-panel .field { display: block; width: 100%; box-sizing: border-box; padding: 8px 10px;
      margin: 4px 0 2px; border: 1px solid #9ca3af; border-radius: 6px; font: 13px monospace; }
    .setup-panel label { display: block; font-size: 13px; font-weight: 600; color: #374151; }
    .helper { margin: 0 0 12px; }
      .guide-shot { margin: 14px 0 0; display: none; }
      .guide-shot a { display: block; }
      .shot { display: none; width: 100%; border: 1px solid #e5e7eb; border-radius: 10px; }
      .guide-shot figcaption { margin-top: 6px; }
      .fact-list { margin: 8px 0 20px; padding-left: 22px; }
    .fact-list li { margin: 6px 0; }
    .cfg-status { font-size: 13px; margin-left: 10px; }
    .cfg-status.ok  { color: #059669; }
    .cfg-status.bad { color: #dc2626; }
    button.act:active, .dl-btn:active { transform: translateY(1px); }
    button.act:focus-visible, .dl-btn:focus-visible, a:focus-visible, input:focus-visible {
      outline: 2px solid #4f46e5; outline-offset: 2px; }
    @media (max-width: 640px) {
      body { margin: 28px auto; padding: 0 16px; }
      .setup-panel { padding-inline: 14px; }
      .stage-head { display: block; }
      .stage-head .step-num { margin-bottom: 8px; }
      .cfg-status { display: block; margin: 8px 0 0; }
    }
  </style>
</head>
<body>
  <h1 data-i18n="ext_name"></h1>
  <p class="sub" data-dest-only="obsidian" data-i18n="welcome_sub_obsidian"></p>
  <p class="sub" data-dest-only="notion" data-i18n="welcome_sub_notion"></p>

  <h2 data-i18n="welcome_conn_title"></h2>
  <div class="check" id="conn-check">
    <div class="status" id="conn-status" data-i18n="welcome_conn_checking"></div>
    <div class="detail" id="conn-detail"></div>
  </div>

  <section id="dest-card">
    <h2 data-i18n="welcome_dest_title"></h2>
    <div class="dest-choice">
      <label><input type="radio" name="dest" value="obsidian" id="dest-obsidian"> <span data-i18n="welcome_dest_obsidian"></span></label>
      <label><input type="radio" name="dest" value="notion" id="dest-notion"> <span data-i18n="welcome_dest_notion"></span></label>
    </div>
  </section>

  <div id="notion-content" data-dest-only="notion">
    <div id="notion-setup" class="setup-panel">
      <section class="stage">
        <div class="stage-head">
          <div class="step-num">1</div>
          <div>
            <h3 class="stage-title" data-i18n="welcome_notion_stage1_title"></h3>
            <p class="stage-outcome" data-i18n="welcome_notion_stage1_outcome"></p>
          </div>
        </div>
        <p><a class="dl-btn" target="_blank" rel="noopener"
              href="https://www.notion.so/profile/integrations"
              data-i18n="welcome_notion_s1_link"></a></p>
        <ol class="setup-steps">
          <li data-i18n="welcome_notion_stage1_step1"></li>
          <li data-i18n="welcome_notion_stage1_step2"></li>
          <li data-i18n="welcome_notion_stage1_step3"></li>
          <li data-i18n="welcome_notion_stage1_step4"></li>
          <li data-i18n="welcome_notion_stage1_step5"></li>
          <li data-i18n="welcome_notion_stage1_step6"></li>
          <li data-i18n="welcome_notion_stage1_step7"></li>
        </ol>
        <figure class="guide-shot">
          <a href="guide/notion-create-connection.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/notion-create-connection.png"
                 data-i18n-alt="welcome_notion_img1_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_notion_img1_caption"></figcaption>
        </figure>
        <figure class="guide-shot">
          <a href="guide/notion-create-connection-dialog.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/notion-create-connection-dialog.png"
                 data-i18n-alt="welcome_notion_img2_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_notion_img2_caption"></figcaption>
        </figure>
        <figure class="guide-shot">
          <a href="guide/notion-copy-token.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/notion-copy-token.png"
                 data-i18n-alt="welcome_notion_img3_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_notion_img3_caption"></figcaption>
        </figure>
        <p class="note" data-i18n="welcome_notion_token_warning"></p>
      </section>

      <section class="stage">
        <div class="stage-head">
          <div class="step-num">2</div>
          <div>
            <h3 class="stage-title" data-i18n="welcome_notion_stage2_title"></h3>
            <p class="stage-outcome" data-i18n="welcome_notion_stage2_outcome"></p>
          </div>
        </div>
        <p><a class="dl-btn" target="_blank" rel="noopener"
              data-i18n="welcome_notion_s2_link" data-i18n-href="welcome_notion_tpl_url"></a></p>
        <ol class="setup-steps">
          <li data-i18n="welcome_notion_stage2_step1"></li>
          <li data-i18n="welcome_notion_stage2_step2"></li>
          <li data-i18n="welcome_notion_stage2_step3"></li>
          <li data-i18n="welcome_notion_stage2_step4"></li>
          <li data-i18n="welcome_notion_stage2_step5"></li>
          <li data-i18n="welcome_notion_stage2_step6"></li>
          <li data-i18n="welcome_notion_stage2_step7"></li>
        </ol>
        <figure class="guide-shot">
          <a href="guide/notion-connect-template.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/notion-connect-template.png"
                 data-i18n-alt="welcome_notion_img4_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_notion_img4_caption"></figcaption>
        </figure>
      </section>

      <section class="stage">
        <div class="stage-head">
          <div class="step-num">3</div>
          <div>
            <h3 class="stage-title" data-i18n="welcome_notion_stage3_title"></h3>
            <p class="stage-outcome" data-i18n="welcome_notion_stage3_outcome"></p>
          </div>
        </div>
        <label for="notion-token" data-i18n="welcome_notion_token_label"></label>
        <input type="password" id="notion-token" class="field" autocomplete="off">
        <p class="helper" data-i18n="welcome_notion_token_helper"></p>
        <label for="notion-parent" data-i18n="welcome_notion_parent_label"></label>
        <input type="text" id="notion-parent" class="field" placeholder="https://www.notion.so/…">
        <p class="helper" data-i18n="welcome_notion_parent_helper"></p>
        <p><button class="act" id="btn-notion-save" data-i18n="welcome_notion_save_test"></button>
        <span id="notion-config-status" class="cfg-status" aria-live="polite"></span></p>
      </section>
    </div>

    <section id="try-it-notion" hidden>
      <h2 data-i18n="welcome_notion_tryit_title"></h2>
      <p data-i18n="welcome_notion_tryit_body"></p>
      <p><a target="_blank" rel="noopener"
            data-i18n="welcome_notion_tryit_link_text"
            data-i18n-href="welcome_notion_tryit_url"></a></p>
    </section>

    <section>
      <h2 data-i18n="welcome_notion_workflow_title"></h2>
      <p data-i18n="welcome_notion_workflow_body"></p>
    </section>

      <section>
        <h2 data-i18n="welcome_notion_storage_title"></h2>
        <p data-i18n="welcome_notion_storage_body"></p>
        <ul class="fact-list">
          <li data-i18n="welcome_notion_storage_fact1"></li>
          <li data-i18n="welcome_notion_storage_fact2"></li>
          <li data-i18n="welcome_notion_storage_fact3"></li>
        </ul>
      </section>

    <section>
      <h2 data-i18n="welcome_notion_modes_title"></h2>
      <div class="step"><div class="step-num" style="background:#ee8d83" data-i18n="welcome_mode_ss_badge"></div><div><p data-i18n="welcome_notion_mode_ss"></p></div></div>
      <div class="step"><div class="step-num" style="background:#f7de83" data-i18n="welcome_mode_cover_badge"></div><div><p data-i18n="welcome_notion_mode_cover"></p></div></div>
      <div class="step"><div class="step-num" style="background:#a8c8f9" data-i18n="welcome_mode_hook_badge"></div><div><p data-i18n="welcome_notion_mode_hook"></p></div></div>
      <div class="step"><div class="step-num" style="background:#c4efe0" data-i18n="welcome_mode_kf_badge"></div><div><p data-i18n="welcome_notion_mode_kf"></p></div></div>
    </section>

    <section>
      <h2 data-i18n="welcome_notion_tips_title"></h2>
      <ul class="fact-list">
        <li data-i18n="welcome_notion_tip1"></li>
        <li data-i18n="welcome_notion_tip2"></li>
        <li data-i18n="welcome_notion_tip3"></li>
        <li data-i18n="welcome_notion_tip4"></li>
      </ul>
    </section>
  </div>

  <div id="obsidian-content" data-dest-only="obsidian">
    <div id="setup-triage" hidden>
      <h2 data-i18n="welcome_triage_q"></h2>
      <p>
        <button class="act" id="btn-triage-first" data-i18n="welcome_triage_first"></button>
        <button class="act" id="btn-triage-installed" data-i18n="welcome_triage_installed"></button>
      </p>
    </div>

    <div id="troubleshoot-guide" hidden>
      <h2 data-i18n="welcome_trouble_title"></h2>
      <p id="trouble-known" hidden data-i18n="welcome_trouble_known"></p>
      <div class="step">
        <div class="step-num">1</div>
        <div><p data-i18n="welcome_trouble_s1"></p>
        <p><button class="act" id="btn-open-obsidian" data-i18n="welcome_open_obsidian"></button></p></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div><p data-i18n-html="welcome_trouble_s2_html"></p></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div><p id="trouble-port"></p></div>
      </div>
      <p class="alt"><a href="#" id="lnk-show-install" data-i18n="welcome_trouble_to_install"></a></p>
    </div>

    <div id="install-guide" hidden>
      <h2 data-i18n="welcome_install_title"></h2>
      <div class="step">
        <div class="step-num">1</div>
        <div><p data-i18n-html="welcome_pin_html"></p>
        <figure class="guide-shot">
          <a href="guide/chrome-pin-extension.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/chrome-pin-extension.png" data-i18n-alt="welcome_install_img_pin_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_pin_caption"></figcaption>
        </figure></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div><p data-i18n="welcome_install_s1"></p>
        <p><a class="dl-btn" id="btn-download-zip"
              href="https://github.com/echore/vault-autopilot/releases/latest/download/vault-autopilot.zip"
              data-i18n="welcome_install_s1_btn"></a></p></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div><p data-i18n-html="welcome_install_open_html"></p>
        <figure class="guide-shot">
          <a href="guide/obsidian-open-settings.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-open-settings.png" data-i18n-alt="welcome_install_img_gear_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_gear_caption"></figcaption>
        </figure>
        <figure class="guide-shot">
          <a href="guide/obsidian-plugins-folder.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-plugins-folder.png" data-i18n-alt="welcome_install_img_folder_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_folder_caption"></figcaption>
        </figure></div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div><p data-i18n-html="welcome_install_manual_c_html"></p>
        <figure class="guide-shot">
          <a href="guide/obsidian-unzip-plugins.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-unzip-plugins.png" data-i18n-alt="welcome_install_img1_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img1_caption"></figcaption>
        </figure>
        </div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div><p data-i18n-html="welcome_install_s3_html"></p>
        <figure class="guide-shot">
          <a href="guide/obsidian-enable-plugin.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-enable-plugin.png" data-i18n-alt="welcome_install_img2_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img2_caption"></figcaption>
        </figure></div>
      </div>
      <div class="step">
        <div class="step-num">6</div>
        <div><p data-i18n="welcome_install_s4"></p>
        <p class="zeroconfig" data-i18n-html="welcome_zeroconfig_html"></p></div>
      </div>
    </div>

    <div id="try-it" hidden>
      <div class="step">
        <div class="step-num">7</div>
        <div><h2 style="margin:0 0 6px" data-i18n="welcome_tryit_title"></h2>
        <p data-i18n="welcome_tryit_body"></p>
        <figure class="guide-shot">
          <a href="guide/chrome-panel.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/chrome-panel.png" data-i18n-alt="welcome_install_img_panel_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_panel_caption"></figcaption>
        </figure>
        <p><a id="tryit-link" target="_blank" rel="noopener"
              data-i18n="welcome_tryit_link_text" data-i18n-href="welcome_tryit_url"></a></p></div>
      </div>
      <div class="step">
        <div class="step-num">8</div>
        <div><p data-i18n-html="welcome_gallery_html"></p>
        <figure class="guide-shot">
          <a href="guide/obsidian-gallery.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-gallery.png" data-i18n-alt="welcome_install_img_gallery_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_gallery_caption"></figcaption>
        </figure></div>
      </div>
    </div>

    <h2 data-i18n="welcome_manual_title"></h2>
    <h2 data-i18n="welcome_coop_title"></h2>
    <p data-i18n="welcome_coop_body"></p>
    <p data-i18n="welcome_config_hint"></p>

    <h2 data-i18n="welcome_storage_title"></h2>
    <p data-i18n-html="welcome_storage_body_html"></p>
    <pre class="tree" data-i18n="welcome_tree"></pre>
    <p class="alt" data-i18n="welcome_tree_caption"></p>
    <p data-i18n-html="welcome_storage_custom_html"></p>

    <h2 data-i18n="welcome_modes_title"></h2>
    <div class="step">
      <div class="step-num" style="background:#ee8d83" data-i18n="welcome_mode_ss_badge"></div>
      <div><p data-i18n-html="welcome_mode_ss_html"></p></div>
    </div>
    <div class="step">
      <div class="step-num" style="background:#f7de83" data-i18n="welcome_mode_cover_badge"></div>
      <div><p data-i18n-html="welcome_mode_cover_html"></p></div>
    </div>
    <div class="step">
      <div class="step-num" style="background:#a8c8f9" data-i18n="welcome_mode_hook_badge"></div>
      <div><p data-i18n-html="welcome_mode_hook_html"></p></div>
    </div>
    <div class="step">
      <div class="step-num" style="background:#c4efe0" data-i18n="welcome_mode_kf_badge"></div>
      <div><p data-i18n-html="welcome_mode_kf_html"></p></div>
    </div>

    <h2 data-i18n="welcome_tips_title"></h2>
    <p data-i18n="welcome_tip1"></p>
    <p data-i18n-html="welcome_tip2_html"></p>
    <p data-i18n="welcome_tip3"></p>

    <details class="adv" id="customize-panel">
      <summary data-i18n="welcome_customize_summary"></summary>
      <div style="margin-top:8px">
        <p data-i18n-html="welcome_customize_body_html"></p>
        <figure class="guide-shot">
          <a href="guide/obsidian-settings.png" target="_blank" rel="noopener">
            <img class="shot" src="guide/obsidian-settings.png" data-i18n-alt="welcome_install_img_settings_alt" alt="">
          </a>
          <figcaption data-i18n="welcome_install_img_settings_caption"></figcaption>
        </figure>
      </div>
    </details>

    <details class="adv" id="adv-port">
      <summary data-i18n="welcome_adv_summary"></summary>
      <p style="margin-top:8px" data-i18n-html="welcome_adv_body_html"></p>
      <p><span data-i18n="welcome_port_label"></span> <input id="port-input" type="number" min="1025" max="65535">
         <button class="act" id="btn-save-port" data-i18n="welcome_port_save"></button>
         <span class="detail" id="port-saved"></span></p>
    </details>
  </div>

  <script type="module" src="welcome.js"></script>
</body>
</html>
