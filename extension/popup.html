<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font: 13px/1.5 system-ui, sans-serif; color: #1f2937; background: #fff; }

    .header { padding: 14px 16px 10px; border-bottom: 1px solid #f3f4f6; }
    .header h1 { font-size: 14px; font-weight: 600; color: #111827; }
    .header p  { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    .modes { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

    .mode-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; cursor: pointer;
      font: 600 13px system-ui; color: #111827;
      text-align: left; transition: background .15s;
    }
    .mode-btn:hover:not(:disabled) { background: #ede9fe; border-color: #a5b4fc; }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .mode-btn.active { background: #ede9fe; border-color: #6366f1; color: #4338ca; }

    .mode-btn .icon { font-size: 18px; flex-shrink: 0; }
    .mode-btn .label { display: flex; flex-direction: column; gap: 1px; }
    .mode-btn .title { font-weight: 600; }
    .mode-btn .sub { font-size: 10px; color: #9ca3af; font-weight: 400; }
    .mode-btn:disabled .sub { color: #d1d5db; }

    #keyframe-hint {
      font-size: 11px; color: #6366f1; padding: 2px 12px 6px;
      display: none;
    }

    #error-msg { font-size: 11px; color: #ef4444; padding: 4px 12px 8px;
      display: none; line-height: 1.4; }

    .batch-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px 10px; font-size: 11px; color: #6b7280;
    }
    .batch-label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
    #btn-batch-analyze {
      background: #6366f1; color: #fff; border: none;
      padding: 4px 10px; border-radius: 6px; font-size: 11px;
      cursor: pointer; display: none;
    }
    #btn-batch-analyze:hover { background: #4f46e5; }

    .footer { padding: 8px 12px; border-top: 1px solid #f3f4f6; }
    .footer a { font-size: 11px; color: #9ca3af; text-decoration: none; }
    .footer a:hover { color: #6366f1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Obsidian Visual Clipper</h1>
    <p>截图与视频帧 → Obsidian</p>
  </div>

  <div class="modes">
    <button class="mode-btn" id="btn-screenshot">
      <span class="icon">📷</span>
      <span class="label">
        <span class="title">截图</span>
        <span class="sub">框选任意区域</span>
      </span>
    </button>

    <button class="mode-btn" id="btn-hook" disabled>
      <span class="icon">🎬</span>
      <span class="label">
        <span class="title">Hook 分析</span>
        <span class="sub" id="hook-sub">自动抓取视频开头 15s</span>
      </span>
    </button>

    <button class="mode-btn" id="btn-keyframe" disabled>
      <span class="icon">🎞</span>
      <span class="label">
        <span class="title">视频关键帧</span>
        <span class="sub">标记 In / Out，采样关键帧</span>
      </span>
    </button>

    <button class="mode-btn" id="btn-thumbnail" disabled>
      <span class="icon">🖼️</span>
      <span class="label">
        <span class="title">收藏封面</span>
        <span class="sub">封面 + 标题分析存入 Great Videos</span>
      </span>
    </button>
  </div>

  <div class="batch-row">
    <label class="batch-label">
      <input type="checkbox" id="batch-toggle">
      <span>批量截图</span>
    </label>
    <button id="btn-batch-analyze">分析全部 (<span id="batch-count">0</span>)</button>
  </div>

  <div id="keyframe-hint"></div>
  <div id="error-msg"></div>

  <div class="footer">
    <a id="open-welcome" href="#">安装说明 / 帮助</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
