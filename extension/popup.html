<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font: 13px/1.5 system-ui, sans-serif; color: #1f2937; background: #fff; }

    .header { padding: 14px 16px 10px; border-bottom: 1px solid #f3f4f6; }
    .header h1 { font-size: 14px; font-weight: 600; color: #111827; }
    .header p  { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    #clip-btn {
      display: block; width: calc(100% - 32px); margin: 12px 16px;
      padding: 10px; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; font: 600 13px system-ui; cursor: pointer;
    }
    #clip-btn:hover { background: #4f46e5; }
    #clip-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .section-title { padding: 6px 16px 4px; font-size: 11px; font-weight: 600;
      color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }

    .setting-row { display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; }
    .setting-row label { font-size: 11px; color: #6b7280; flex-shrink: 0; }
    .setting-row input {
      flex: 1; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: 4px 8px; font: 12px system-ui; color: #111827;
    }
    #save-hint { font-size: 11px; color: #6366f1; opacity: 0;
      transition: opacity .3s; padding: 0 16px 6px; }

    #history-list { max-height: 180px; overflow-y: auto; }
    .history-item { display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-top: 1px solid #f9fafb; cursor: pointer; }
    .history-item:hover { background: #f9fafb; }
    .history-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok  { background: #22c55e; }
    .dot-err { background: #ef4444; }
    .history-text { flex: 1; min-width: 0; }
    .history-title { font-size: 12px; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .history-time  { font-size: 11px; color: #9ca3af; }
    .history-empty { display: block; padding: 12px 16px; font-size: 12px; color: #9ca3af; }

    .footer { padding: 8px 16px; border-top: 1px solid #f3f4f6; }
    .footer a { font-size: 11px; color: #9ca3af; text-decoration: none; }
    .footer a:hover { color: #6366f1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Screenshot Clipper</h1>
    <p>框选截图 → Obsidian 审美笔记</p>
  </div>

  <button id="clip-btn">✂ Clip 当前页面</button>

  <div class="section-title">设置</div>
  <div class="setting-row">
    <label for="vault_name">Vault</label>
    <input id="vault_name" type="text" placeholder="Obsidian Vault">
  </div>
  <div id="save-hint">已保存</div>

  <div class="section-title">最近 Clip</div>
  <div id="history-list"></div>

  <div class="footer">
    <a id="open-welcome" href="#">安装说明 / 帮助</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
